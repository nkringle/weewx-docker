[Skin]
    # Configuration for Aero Skin
    version = 2.7.0
    name = Aero
    
[CheetahGenerator]
    encoding = utf8

    # Register custom Search List Extensions
    search_list_extensions = user.aero_forecast.AeroForecast

    # Reports that show statistics "to date", such as day-to-date,
    # week-to-date, month-to-date, etc.
    [[ToDate]]
        [[[current]]]
            template = data/current.json.tmpl
            filename = data/current.json
            
        [[[index]]]
            template = index.html.tmpl
            filename = index.html
            
        [[[trends]]]
            template = data/trends.json.tmpl
            filename = data/trends.json
            
        # "Today" snapshot (convenience alias for current day)
        [[[today]]]
            template = data/today.json.tmpl
            filename = data/today.json
            
        # Current Week to Date
        [[[week]]]
            template = data/week-to-date.json.tmpl
            filename = data/week-to-date.json
            
        # Current Month to Date
        [[[month]]]
            template = data/month.json.tmpl
            filename = data/month.json
            
        # Current Year to Date
        [[[year]]]
            template = data/year.json.tmpl
            filename = data/year.json

        # Homebridge integration
        [[[weatherplus]]]
            template = data/weatherplus.json.tmpl
            filename = data/weatherplus.json

        # Weather forecast
        [[[forecast]]]
            template = data/forecast.json.tmpl
            filename = data/forecast.json

    # Daily Archive (History)
    [[SummaryByDay]]
        [[[day]]]
            template = data/day-YYYY-MM-DD.json.tmpl
            filename = data/day-%Y-%m-%d.json

    # Monthly Archive (History)
    [[SummaryByMonth]]
        [[[month]]]
            template = data/month-YYYY-MM.json.tmpl
            filename = data/month-%Y-%m.json

    # Yearly Archive (History)
    [[SummaryByYear]]
        [[[year]]]
            template = data/year-YYYY.json.tmpl
            filename = data/year-%Y.json

[CopyGenerator]
    # This section is used by the CopyGenerator

    # The list of files to be copied to the report    # Files to copy once
    copy_once = style.css, app.js, utils.js, charts.js, ui.js, state.js, events.js

[Generators]
    # The list of generators to be run
    generator_list = weewx.cheetahgenerator.CheetahGenerator, weewx.reportengine.CopyGenerator

[Extras]
    # Forecast Configuration
    # Enable or disable the forecast feature
    enable_forecast = true

    # Optional: Specify location for forecast (defaults to station location)
    # forecast_latitude = 37.7749
    # forecast_longitude = -122.4194

    # Optional: Open-Meteo API key for higher rate limits (free tier works without key)
    # openmeteo_api_key = your_api_key_here

    # Optional: Custom cache database path (defaults to /var/tmp/aero_forecast_cache.db)
    # forecast_cache_db = /var/tmp/aero_forecast_cache.db
